name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify tag matches metadata version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(python -c "import json; print(json.load(open('metadata.json'))['versions'][0]['version'])")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match metadata.json version $VERSION"
            exit 1
          fi

      - name: Build PCM package
        run: python scripts/pack_pcm.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/*.zip
          generate_release_notes: false
          body_path: .github/release-notes/${{ github.ref_name }}.md
          fail_on_unmatched_files: true
